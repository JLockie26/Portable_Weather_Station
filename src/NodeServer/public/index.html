<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Weather Dashboard</title>
</head>
<body>
    <h1>Welcome to the weather dashboard!</h1>
    <h2>Current Weather:</h2>
    <section id="weather-stats">
        <h3>Temperature(C):</h3>
        <p id="temp-stat"></p>
        <h3>Humidity(%):</h3>
        <p id="humid-stat"></p>
        <h3>Barometric Pressure(hPa):</h3>
        <p id="press-stat"></p>
    </section>
    <script src="/js/updateStats.js"></script>
</body>
</html>
